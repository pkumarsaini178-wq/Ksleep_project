<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KSleep — My Orders</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#07070f;--deep:#0e0e1a;--card:#1a1a2a;
  --gold:#c9a84c;--gold2:#e8c96e;--cream:#f5f0e8;--muted:#6b6575;
  --glass-border:rgba(201,168,76,0.18);
  --green:#4ade80;--red:#f87171;--blue:#60a5fa;--orange:#fb923c;
}
body{background:var(--ink);color:var(--cream);font-family:'DM Sans',sans-serif;overflow-x:hidden;min-height:100vh;}
#cursor{position:fixed;width:14px;height:14px;border-radius:50%;background:var(--gold);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width 0.2s,height 0.2s;mix-blend-mode:difference;}
#cursor-ring{position:fixed;width:40px;height:40px;border-radius:50%;border:1px solid rgba(201,168,76,0.5);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.12s ease;}
#loader{position:fixed;inset:0;z-index:99999;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.8s,visibility 0.8s;}
#loader.done{opacity:0;visibility:hidden;}
.loader-logo{font-family:'Cormorant Garamond',serif;font-size:40px;color:var(--gold);letter-spacing:6px;margin-bottom:40px;animation:pulse 1.5s ease-in-out infinite;}
.loader-bar{width:200px;height:1px;background:rgba(201,168,76,0.2);}
.loader-fill{height:100%;background:var(--gold);animation:loadFill 1.6s ease forwards;}
@keyframes loadFill{from{width:0;}to{width:100%;}}
@keyframes pulse{0%,100%{opacity:0.5;}50%{opacity:1;}}
.particles{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;}
.particle{position:absolute;border-radius:50%;background:var(--gold);opacity:0;animation:floatP var(--dur,8s) var(--delay,0s) infinite ease-in-out;}
@keyframes floatP{0%{opacity:0;transform:translateY(100vh);}10%{opacity:0.3;}90%{opacity:0.08;}100%{opacity:0;transform:translateY(-10vh) translateX(var(--dx,20px));}}
header{position:fixed;top:0;width:100%;padding:20px 6%;display:flex;justify-content:space-between;align-items:center;z-index:1000;backdrop-filter:blur(20px);background:rgba(7,7,15,0.8);border-bottom:1px solid rgba(201,168,76,0.08);}
.logo{font-family:'Cormorant Garamond',serif;font-size:24px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;}
nav a{color:var(--muted);margin-left:24px;text-decoration:none;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;transition:color 0.3s;position:relative;}
nav a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:var(--gold);transition:width 0.3s;}
nav a:hover{color:var(--gold);}nav a:hover::after{width:100%;}
nav a.active{color:var(--gold);}
.page{max-width:1100px;margin:0 auto;padding:110px 5% 80px;}
.page-header{margin-bottom:40px;opacity:0;transform:translateY(20px);animation:fadeUp 0.8s 0.3s forwards;}
.page-eyebrow{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:12px;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,5vw,56px);font-weight:400;line-height:1.1;}
.page-title em{font-style:italic;color:var(--gold);}
.page-sub{font-size:14px;color:var(--muted);margin-top:10px;}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}

/* AUTO STATUS LEGEND */
.status-legend{
  display:flex;gap:20px;flex-wrap:wrap;
  padding:16px 20px;border:1px solid var(--glass-border);
  background:rgba(201,168,76,0.03);margin-bottom:28px;
  opacity:0;animation:fadeUp 0.8s 0.6s forwards;
}
.legend-item{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);letter-spacing:0.5px;}
.legend-dot{width:8px;height:8px;border-radius:50%;}
.legend-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-right:8px;flex-shrink:0;}

.controls{display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap;opacity:0;animation:fadeUp 0.8s 0.5s forwards;}
.search-wrap{flex:1;min-width:220px;position:relative;}
.search-wrap input{width:100%;padding:13px 16px 13px 44px;background:rgba(255,255,255,0.03);border:1px solid var(--glass-border);color:var(--cream);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color 0.3s,background 0.3s;}
.search-wrap input:focus{border-color:rgba(201,168,76,0.5);background:rgba(201,168,76,0.03);}
.search-wrap input::placeholder{color:var(--muted);}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none;}
.filter-btn{padding:13px 18px;background:transparent;border:1px solid var(--glass-border);color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.3s;white-space:nowrap;}
.filter-btn.active,.filter-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,0.05);}

.order-count{font-size:12px;color:var(--muted);letter-spacing:1px;margin-bottom:20px;opacity:0;animation:fadeUp 0.8s 0.7s forwards;}
.order-count span{color:var(--gold);font-size:14px;}

/* ORDER CARD */
.order-card{background:var(--card);border:1px solid var(--glass-border);margin-bottom:16px;overflow:hidden;position:relative;opacity:0;transform:translateY(24px);transition:border-color 0.3s,transform 0.3s;}
.order-card.visible{opacity:1;transform:translateY(0);transition:opacity 0.6s ease,transform 0.6s ease,border-color 0.3s,box-shadow 0.3s;}
.order-card:hover{border-color:rgba(201,168,76,0.4);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.3);}
.order-card::before{content:'';position:absolute;top:0;left:0;width:0;height:2px;background:linear-gradient(to right,var(--gold),var(--gold2));transition:width 0.5s ease;}
.order-card:hover::before{width:100%;}
.card-body{display:grid;grid-template-columns:110px 1fr auto auto;gap:24px;align-items:center;padding:24px 28px;}
.order-img-wrap{width:110px;height:110px;overflow:hidden;flex-shrink:0;border:1px solid var(--glass-border);}
.order-img-wrap img{width:100%;height:100%;object-fit:cover;filter:brightness(0.8);transition:transform 0.5s,filter 0.4s;}
.order-card:hover .order-img-wrap img{transform:scale(1.08);filter:brightness(1);}
.order-tag{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
.order-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--cream);margin-bottom:8px;line-height:1.2;}
.order-meta{font-size:12px;color:var(--muted);line-height:1.8;}
.order-meta strong{color:rgba(245,240,232,0.6);font-weight:400;}
.stars-row{display:flex;gap:4px;margin-top:10px;align-items:center;}
.star{font-size:17px;cursor:pointer;color:rgba(201,168,76,0.2);transition:color 0.2s,transform 0.2s;}
.star:hover,.star.lit{color:var(--gold);}
.star:hover{transform:scale(1.25);}
.rating-label{font-size:10px;letter-spacing:1px;color:var(--muted);margin-left:6px;}
.order-price-col{text-align:right;flex-shrink:0;min-width:100px;}
.order-price{font-family:'Cormorant Garamond',serif;font-size:30px;color:var(--gold);line-height:1;}
.order-qty{font-size:11px;color:var(--muted);letter-spacing:1px;margin-top:4px;}
.order-date-col{font-size:11px;color:var(--muted);margin-top:6px;}
.order-actions{display:flex;flex-direction:column;gap:10px;align-items:flex-end;flex-shrink:0;}

/* STATUS BADGE */
.status-badge{display:inline-flex;align-items:center;gap:6px;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:7px 14px;border:1px solid;white-space:nowrap;}
.status-confirmed{color:var(--blue);border-color:rgba(96,165,250,0.3);background:rgba(96,165,250,0.06);}
.status-processing{color:#a78bfa;border-color:rgba(167,139,250,0.3);background:rgba(167,139,250,0.06);}
.status-shipped{color:var(--orange);border-color:rgba(251,146,60,0.3);background:rgba(251,146,60,0.06);}
.status-delivered{color:var(--green);border-color:rgba(74,222,128,0.3);background:rgba(74,222,128,0.06);}
.status-cancelled{color:var(--red);border-color:rgba(248,113,113,0.3);background:rgba(248,113,113,0.06);}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}

/* COUNTDOWN BADGE */
.countdown-badge{
  font-size:10px;letter-spacing:1px;color:var(--muted);
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(201,168,76,0.1);
  padding:5px 12px;white-space:nowrap;
}
.countdown-badge span{color:var(--gold);}

.btn-cancel{padding:8px 18px;background:transparent;border:1px solid rgba(248,113,113,0.3);color:var(--red);font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.3s;text-decoration:none;display:inline-block;}
.btn-cancel:hover{background:rgba(248,113,113,0.08);border-color:var(--red);}

/* TIMELINE */
.timeline-strip{display:flex;align-items:center;padding:14px 28px;border-top:1px solid rgba(201,168,76,0.07);background:rgba(255,255,255,0.01);}
.tl-step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;}
.tl-step:not(:last-child)::after{content:'';position:absolute;top:10px;left:55%;width:90%;height:1px;background:rgba(201,168,76,0.1);transition:background 0.5s;}
.tl-step.done:not(:last-child)::after{background:rgba(201,168,76,0.5);}
.tl-step.active:not(:last-child)::after{background:rgba(201,168,76,0.2);}
.tl-dot{width:22px;height:22px;border-radius:50%;border:1px solid rgba(201,168,76,0.15);background:var(--ink);display:flex;align-items:center;justify-content:center;font-size:8px;margin-bottom:6px;transition:all 0.4s;}
.tl-step.done .tl-dot{border-color:var(--gold);background:rgba(201,168,76,0.15);color:var(--gold);}
.tl-step.active .tl-dot{border-color:var(--gold);background:var(--gold);color:var(--ink);box-shadow:0 0 12px rgba(201,168,76,0.4);animation:activePulse 2s infinite;}
@keyframes activePulse{0%,100%{box-shadow:0 0 8px rgba(201,168,76,0.3);}50%{box-shadow:0 0 18px rgba(201,168,76,0.6);}}
.tl-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:center;}
.tl-step.done .tl-label,.tl-step.active .tl-label{color:var(--gold);}
.tl-date{font-size:8px;color:rgba(201,168,76,0.5);text-align:center;margin-top:2px;}

/* PROGRESS BAR */
.progress-bar-wrap{height:2px;background:rgba(201,168,76,0.08);margin:0;}
.progress-bar-fill{height:100%;background:linear-gradient(to right,var(--gold),var(--gold2));transition:width 1s ease;}

.empty-state{text-align:center;padding:80px 20px;}
.empty-icon{font-size:48px;color:rgba(201,168,76,0.15);margin-bottom:20px;}
.empty-title{font-family:'Cormorant Garamond',serif;font-size:34px;color:var(--muted);margin-bottom:12px;}
.empty-sub{font-size:13px;color:var(--muted);margin-bottom:32px;line-height:1.7;}
.btn-shop{padding:14px 36px;background:var(--gold);color:var(--ink);border:none;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);transition:0.3s;}
.btn-shop:hover{background:var(--gold2);}
.error-state{text-align:center;padding:60px 20px;border:1px solid rgba(248,113,113,0.2);background:rgba(248,113,113,0.03);}
.error-title{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--red);margin-bottom:12px;}
.error-sub{font-size:13px;color:var(--muted);line-height:1.8;}
.error-code{font-size:11px;color:rgba(248,113,113,0.5);margin-top:12px;font-family:monospace;background:rgba(248,113,113,0.04);padding:8px 16px;display:inline-block;}
#toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--glass-border);color:var(--cream);padding:13px 26px;font-size:12px;letter-spacing:1px;z-index:9999;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}
@media(max-width:768px){
  .card-body{grid-template-columns:80px 1fr;gap:14px;}
  .order-price-col,.order-actions{grid-column:2;}
  nav{display:none;}
  .filter-btn{padding:10px 12px;font-size:10px;}
  .status-legend{gap:12px;}
}
</style>
</head>
<body>

<div id="loader">
  <div class="loader-logo">KSLEEP</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
</div>
<div id="cursor"></div>
<div id="cursor-ring"></div>
<div class="particles" id="particles"></div>
<div id="toast">✦ &nbsp;<span id="toastMsg"></span></div>

<header>
  <div class="logo">K·Sleep</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="openProduct.html">Products</a>
    <a href="myorder.html" class="active">My Orders</a>
  </nav>
</header>

<div class="page">

  <div class="page-header">
    <p class="page-eyebrow">— My Account —</p>
    <h1 class="page-title">My <em>Orders</em></h1>
    <p class="page-sub">Track, rate and manage all your KSleep purchases</p>
  </div>

  <!-- AUTO STATUS LEGEND -->
  <div class="status-legend">
    <span class="legend-title">Auto Timeline:</span>
    <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Day 0 — Order Confirmed</div>
    <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div>Day 1 — Processing</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div>Day 2 — Shipped</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Day 4 — Delivered ✦</div>
    <div class="legend-item" style="margin-left:auto;font-size:10px;color:rgba(201,168,76,0.6);">✦ Calculated from order date automatically</div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">◎</span>
      <input type="text" id="searchInput" placeholder="Search by product name..." oninput="filterOrders()">
    </div>
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('confirmed',this)">Confirmed</button>
    <button class="filter-btn" onclick="setFilter('processing',this)">Processing</button>
    <button class="filter-btn" onclick="setFilter('shipped',this)">Shipped</button>
    <button class="filter-btn" onclick="setFilter('delivered',this)">Delivered</button>
    <button class="filter-btn" onclick="setFilter('cancelled',this)">Cancelled</button>
  </div>

  <p class="order-count" id="orderCount">&nbsp;</p>
  <div id="orderContainer"></div>
</div>

<script>
window.addEventListener('load',()=>{setTimeout(()=>document.getElementById('loader').classList.add('done'),1800);});

const cur=document.getElementById('cursor'),ring=document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function animRing(){rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animRing);})();

const pc=document.getElementById('particles');
for(let i=0;i<20;i++){const p=document.createElement('div');p.className='particle';const big=Math.random()>0.7;p.style.cssText=`left:${Math.random()*100}%;width:${big?2.5:1.5}px;height:${big?2.5:1.5}px;--dur:${7+Math.random()*12}s;--delay:${Math.random()*10}s;--dx:${(Math.random()-0.5)*70}px;`;pc.appendChild(p);}

let allOrders=[];
let activeFilter='all';

// ══════════════════════════════════════════════
// ✅ AUTO STATUS LOGIC — calculated from orderDate
// Day 0   = confirmed
// Day 1   = processing
// Day 2-3 = shipped
// Day 4+  = delivered
// ══════════════════════════════════════════════
function getAutoStatus(orderDate, manualStatus){
  // if manually cancelled — keep cancelled
  if(manualStatus === 'cancelled') return 'cancelled';

  if(!orderDate) return 'confirmed';

  const ordered = new Date(orderDate);
  const now     = new Date();

  // difference in full days
  const diffMs   = now - ordered;
  const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

  if(diffDays >= 4) return 'delivered';
  if(diffDays >= 2) return 'shipped';
  if(diffDays >= 1) return 'processing';
  return 'confirmed';
}

// Days remaining until next stage
function getDaysInfo(orderDate, autoStatus){
  if(!orderDate || autoStatus==='delivered' || autoStatus==='cancelled') return null;

  const ordered  = new Date(orderDate);
  const now      = new Date();
  const diffDays = Math.floor((now - ordered)/(1000*60*60*24));

  const nextDay = {confirmed:1, processing:2, shipped:4}[autoStatus];
  if(!nextDay) return null;

  const daysLeft = nextDay - diffDays;
  const nextStatus = {confirmed:'Processing',processing:'Shipped',shipped:'Delivered'}[autoStatus];

  return daysLeft <= 0
    ? null
    : `${nextStatus} in <span>${daysLeft} day${daysLeft>1?'s':''}</span>`;
}

// Timeline steps with dates
function getSteps(orderDate, autoStatus){
  const ordered = orderDate ? new Date(orderDate) : new Date();

  const addDays=(d,n)=>{
    const r=new Date(d);r.setDate(r.getDate()+n);
    return r.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
  };

  const steps=[
    {label:'Confirmed',  day:0,  key:'confirmed'},
    {label:'Processing', day:1,  key:'processing'},
    {label:'Shipped',    day:2,  key:'shipped'},
    {label:'Delivered',  day:4,  key:'delivered'},
  ];

  const statusOrder=['confirmed','processing','shipped','delivered'];
  const currentIdx = autoStatus==='cancelled' ? -1 : statusOrder.indexOf(autoStatus);

  return steps.map((s,i)=>({
    label:s.label,
    date: addDays(ordered, s.day),
    done: currentIdx > i,
    active: currentIdx === i,
    cancelled: autoStatus==='cancelled' && i===0,
  }));
}

// Progress bar width per status
function getProgressWidth(status){
  return {confirmed:8, processing:35, shipped:68, delivered:100, cancelled:0}[status]??0;
}

// Status colors
const statusColors={
  confirmed:'var(--blue)',
  processing:'#a78bfa',
  shipped:'var(--orange)',
  delivered:'var(--green)',
  cancelled:'var(--red)',
};

function renderOrders(orders){
  const container=document.getElementById('orderContainer');
  const countEl=document.getElementById('orderCount');
  countEl.innerHTML=`Showing <span>${orders.length}</span> order${orders.length!==1?'s':''}`;

  if(!orders.length){
    container.innerHTML=`
    <div class="empty-state">
      <div class="empty-icon">◎</div>
      <h2 class="empty-title">No orders found</h2>
      <p class="empty-sub">You haven't placed any orders yet.<br>Start browsing our premium sleep collection.</p>
      <button class="btn-shop" onclick="window.location.href='index.html'">Shop Now ✦</button>
    </div>`;
    return;
  }

  container.innerHTML='';
  orders.forEach((order,idx)=>{

    // ✅ Auto-calculate status from order date
    const autoStatus = getAutoStatus(order.orderDate, order.status);
    const steps      = getSteps(order.orderDate, autoStatus);
    const progress   = getProgressWidth(autoStatus);
    const daysInfo   = getDaysInfo(order.orderDate, autoStatus);

    const date = order.orderDate
      ? new Date(order.orderDate).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})
      : 'N/A';

    const imgSrc = order.image
      ?(order.image.startsWith('http') ? order.image : `http://localhost:1234/images/${order.image}`)
      :'https://images.unsplash.com/photo-1584100936595-c0654b55a2e2?w=300';

    const starsHtml=Array.from({length:5},(_,i)=>`
      <span class="star ${order.rating&&i<order.rating?'lit':''}"
        onclick="rate(${order.id},${i+1},this)">★</span>`).join('');

    const timelineHtml=steps.map(s=>`
      <div class="tl-step ${s.done?'done':''} ${s.active?'active':''}">
        <div class="tl-dot">${s.done?'✓':s.active?'●':''}</div>
        <div class="tl-label">${s.label}</div>
        <div class="tl-date">${s.date}</div>
      </div>`).join('');

    const statusLabel = autoStatus.charAt(0).toUpperCase()+autoStatus.slice(1);

    const countdownHtml = daysInfo && autoStatus!=='cancelled'
      ? `<div class="countdown-badge">Next: ${daysInfo}</div>` : '';

    const cancelLink = autoStatus!=='delivered' && autoStatus!=='cancelled'
      ? `<a class="btn-cancel" href="cancaleorder.html?id=${order.id}&name=${encodeURIComponent(order.productName)}&price=${order.price}&image=${encodeURIComponent(order.image||'')}&address=${encodeURIComponent(order.address||'')}&date=${order.orderDate}">Cancel Order</a>`
      : '';

    const card=document.createElement('div');
    card.className='order-card';
    card.dataset.name=(order.productName||'').toLowerCase();
    card.dataset.status=autoStatus;
    card.style.transitionDelay=`${idx*0.08}s`;

    card.innerHTML=`
      <!-- PROGRESS BAR TOP -->
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" style="width:0%" data-width="${progress}%"></div>
      </div>

      <div class="card-body">
        <div class="order-img-wrap">
          <img src="${imgSrc}" alt="${order.productName||''}"
            onerror="this.src='https://images.unsplash.com/photo-1584100936595-c0654b55a2e2?w=300'">
        </div>

        <div class="order-info">
          <p class="order-tag">KSleep Premium</p>
          <h3 class="order-name">${order.productName||'—'}</h3>
          <div class="order-meta">
            <strong>Customer:</strong> ${order.customerName||'—'}<br>
            <strong>Address:</strong> ${order.address||'—'}<br>
            <strong>Mobile:</strong> ${order.mobile_No||'—'}
          </div>
          <div class="stars-row" id="stars-${order.id}">
            ${starsHtml}
            <span class="rating-label">${autoStatus==='delivered'?'Rate your order':'Available after delivery'}</span>
          </div>
        </div>

        <div class="order-price-col">
          <div class="order-price">₹${Number(order.price||0).toLocaleString('en-IN')}</div>
          <div class="order-qty">Qty: ${order.quantity||order.setQuantity||1}</div>
          <div class="order-date-col">${date}</div>
        </div>

        <div class="order-actions">
          <div class="status-badge status-${autoStatus}">
            <div class="status-dot"></div>${statusLabel}
          </div>
          ${countdownHtml}
          ${cancelLink}
        </div>
      </div>

      <div class="timeline-strip">${timelineHtml}</div>
    `;

    container.appendChild(card);

    // animate card in
    setTimeout(()=>{
      card.classList.add('visible');
      // animate progress bar after card visible
      const bar=card.querySelector('.progress-bar-fill');
      setTimeout(()=>{ if(bar) bar.style.width=bar.dataset.width; },300);
    }, idx*120+100);
  });
}

// ── FETCH with credentials ──
fetch('http://localhost:1234/orderDeatail',{ credentials:'include' })
.then(res=>{ if(!res.ok) throw new Error('HTTP '+res.status); return res.json(); })
.then(data=>{ allOrders=data; renderOrders(data); })
.catch(err=>{
  console.error(err);
  document.getElementById('orderContainer').innerHTML=`
  <div class="error-state">
    <h2 class="error-title">Could not load orders</h2>
    <p class="error-sub">Make sure you are logged in and backend is running.<br>
    Add <b>credentials:'include'</b> to fetch & <b>allowCredentials(true)</b> in WebConfig.java</p>
    <div class="error-code">${err.message}</div>
  </div>`;
  document.getElementById('orderCount').innerHTML='<span style="color:var(--red)">Failed to load</span>';
});

// ── FILTER ──
function setFilter(status,btn){
  activeFilter=status;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterOrders();
}
function filterOrders(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const filtered=allOrders.filter(o=>{
    const autoStatus=getAutoStatus(o.orderDate,o.status);
    const matchSearch=(o.productName||'').toLowerCase().includes(q);
    const matchFilter=activeFilter==='all'||autoStatus===activeFilter;
    return matchSearch&&matchFilter;
  });
  renderOrders(filtered);
}

// ── STAR RATING ──
function rate(orderId,rating,el){
  const wrap=document.getElementById('stars-'+orderId);
  if(!wrap)return;
  wrap.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('lit',i<rating));
  fetch(`http://localhost:1234/saveRating?orderId=${orderId}&rating=${rating}`,{method:'POST',credentials:'include'})
    .then(()=>showToast('Rating saved ✦ '+rating+' star'+(rating>1?'s':'')))
    .catch(()=>showToast('Rating saved ✦'));
  const o=allOrders.find(o=>o.id===orderId);
  if(o)o.rating=rating;
}

// ── TOAST ──
let tt;
function showToast(msg){
  document.getElementById('toastMsg').textContent=msg;
  const t=document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
