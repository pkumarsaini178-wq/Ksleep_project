<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Product</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #ffe0c3, #ffb347);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        background: #ffffff;
        width: 800px;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        margin-bottom: 30px;
        color: #ff8c42;
    }

    .form-group {
        margin-bottom: 20px;
    }

    label {
        font-weight: 600;
        display: block;
        margin-bottom: 6px;
        color: #444;
    }

    input, textarea, select {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        outline: none;
        transition: 0.3s;
    }

    input:focus, textarea:focus, select:focus {
        border-color: #ff8c42;
        box-shadow: 0 0 6px rgba(255,140,66,0.4);
    }

    .image-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
    }

    .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #ff8c42;
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background: #e6732f;
    }

    .footer {
        text-align: center;
        margin-top: 20px;
        color: #888;
        font-size: 14px;
    }

</style>
</head>

<body>

<div class="container">
    <h2>Add New Product</h2>

    <form action="/insertproductdata" method="post" enctype="multipart/form-data">

        <div class="form-group">
            <label>Product Name</label>
            <input type="text" name="productName" placeholder="Enter product name" required>
        </div>

        <div class="form-group">
            <label>Price (₹)</label>
            <input type="number" name="price" placeholder="Enter price" required>
        </div>

        <div class="form-group">
            <label>Material Used</label>
            <input type="text" name="material" placeholder="Example: Cotton, Leather, Wood etc." required>
        </div>

        <div class="form-group">
            <label>Comfort Level</label>
            <select name="comfort">
                <option>High Comfort</option>
                <option>Medium Comfort</option>
                <option>Basic Comfort</option>
            </select>
        </div>

        <div class="form-group">
            <label>Product Description</label>
            <textarea rows="4" name="description" placeholder="Write product details..."></textarea>
        </div>

        <div class="form-group">
            <label>Upload Product Images (Minimum 5)</label>
            <div class="image-grid">
                <input type="file" name="image1" accept="image/*" required>
                <input type="file" name="image2" accept="image/*" required>
                <input type="file" name="image3" accept="image/*" required>
                <input type="file" name="image4" accept="image/*" required>
                <input type="file" name="image5" accept="image/*" required>
            </div>
        </div>

       <button type="submit" class="btn">Add Product</button>

    </form>

    <div class="footer">
        Professional Product Management © 2026
    </div>
</div>

</body>
</html>
